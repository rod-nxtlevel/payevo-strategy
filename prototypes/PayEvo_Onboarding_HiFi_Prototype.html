<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayEvo Onboarding Hi-Fi Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
:root {
  --pe-blue: #2285D0;
  --pe-blue-tint: #EBF6FF;
  --pe-blue-dark: #165585;
  --pe-blue-darker: #02314D;
  --pe-blue-soft: #7AB6E3;
  --pe-blue-deep: #00669B;
  --pe-green: #4CAF50;
  --pe-green-dark: #317033;
  --pe-green-tint: #F1FFF2;
  --pe-orange: #F75C03;
  --pe-orange-tint: #FAA675;
  --pe-orange-dark: #873302;
  --color-warning: #F5B700;
  --color-warning-tint: #F9D773;
  --color-danger: #F8333C;
  --color-danger-tint: #FB8F94;
  --color-danger-dark: #9E2127;
  --color-magenta: #DC0073;
  --color-navy: #0A2463;
  --grey-900: #263238;
  --grey-800: #455A64;
  --grey-700: #48525C;
  --grey-600: #70808F;
  --grey-500: #7987A9;
  --grey-400: #C4C4C4;
  --grey-300: #E0E0E0;
  --grey-200: #EBEBEB;
  --grey-150: #F0F0F0;
  --grey-100: #F5F5F5;
  --grey-75: #F4F8FB;
  --grey-50: #F9F9F9;
  --white: #FFFFFF;
  --ink: #444444;
  --bg-page: var(--grey-75);
  --bg-surface: var(--white);
  --bg-surface-2: var(--grey-50);
  --fg-primary: var(--ink);
  --fg-secondary: var(--grey-500);
  --fg-muted: var(--grey-400);
  --fg-on-brand: var(--white);
  --fg-link: var(--pe-blue);
  --fg-heading: var(--pe-blue-deep);
  --border-subtle: var(--grey-300);
  --border-input: var(--grey-400);
  --border-focus: var(--pe-blue);
  --border-error: var(--color-danger);
  --status-success: var(--pe-green);
  --status-warning: var(--color-warning);
  --status-error: var(--color-danger);
  --status-info: var(--pe-blue);
  --fs-display: 50px;
  --fs-h1: 40px;
  --fs-h2: 36px;
  --fs-h3: 30px;
  --fs-h4: 26px;
  --fs-h5: 20px;
  --fs-body: 16px;
  --fs-body-sm: 14px;
  --fs-caption: 12px;
  --fs-micro: 10px;
  --lh-tight: 100%;
  --lh-snug: 120%;
  --lh-normal: 140%;
  --lh-relaxed: 150%;
  --fw-light: 300;
  --fw-regular: 400;
  --fw-medium: 500;
  --fw-semibold: 600;
  --fw-bold: 700;
  --fw-extrabold: 800;
  --radius-sm: 3px;
  --radius: 5px;
  --radius-md: 8px;
  --radius-card: 10px;
  --radius-lg: 12px;
  --radius-xl: 20px;
  --radius-pill: 999px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-card: 0 1px 2px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
  --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-elevated: 0 4px 16px rgba(0,0,0,0.10);
  --shadow-floating: 0 8px 24px rgba(0,0,0,0.12);
  --shadow-focus: 0 0 0 3px rgba(34,133,208,0.25);
  --shadow-focus-error: 0 0 0 3px rgba(248,51,60,0.25);
  --header-h: 64px;
  --content-max: 1600px;
  --ease-standard: cubic-bezier(.2, .0, .2, 1);
  --dur-fast: 120ms;
  --dur: 180ms;
  --dur-slow: 280ms;
  --card-max: 720px;
}

* { box-sizing: border-box; }
html { min-height: 100%; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg-page);
  color: var(--fg-primary);
  font-size: var(--fs-body);
  line-height: var(--lh-normal);
}
button, input, select, textarea { font: inherit; }
button { min-height: 44px; }
a { color: var(--fg-link); }
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 40;
  height: var(--header-h);
  display: grid;
  grid-template-columns: minmax(210px, 1fr) minmax(420px, 620px) minmax(210px, 1fr);
  align-items: center;
  gap: 20px;
  padding: 0 24px;
  background: rgba(255,255,255,0.96);
  border-bottom: 1px solid var(--border-subtle);
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(12px);
}
.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.brand-mark {
  width: 34px;
  height: 34px;
  border-radius: var(--radius);
  background: linear-gradient(135deg, var(--pe-blue-darker), var(--pe-blue));
  color: var(--white);
  display: grid;
  place-items: center;
  font-weight: var(--fw-bold);
  letter-spacing: -0.02em;
}
.brand-name {
  font-weight: var(--fw-bold);
  color: var(--grey-900);
  white-space: nowrap;
}
.plan-badge {
  display: inline-flex;
  align-items: center;
  height: 24px;
  padding: 0 10px;
  border-radius: var(--radius-pill);
  background: var(--grey-150);
  color: var(--grey-700);
  font-size: var(--fs-caption);
  font-weight: var(--fw-semibold);
}
.step-progress {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  align-items: start;
  gap: 0;
}
.step-item {
  position: relative;
  display: grid;
  justify-items: center;
  gap: 4px;
  color: var(--grey-500);
  font-size: var(--fs-caption);
  font-weight: var(--fw-semibold);
}
.step-item::before {
  content: "";
  position: absolute;
  top: 14px;
  left: -50%;
  width: 100%;
  height: 2px;
  background: var(--grey-300);
  z-index: 0;
}
.step-item:first-child::before { display: none; }
.step-dot {
  position: relative;
  z-index: 1;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  border: 2px solid var(--grey-300);
  background: var(--white);
  color: var(--grey-600);
  font-size: var(--fs-caption);
}
.step-item.done::before,
.step-item.active::before { background: var(--pe-green); }
.step-item.done .step-dot {
  background: var(--pe-green);
  border-color: var(--pe-green);
  color: var(--white);
}
.step-item.active .step-dot {
  background: var(--pe-blue);
  border-color: var(--pe-blue);
  color: var(--white);
  box-shadow: var(--shadow-focus);
}
.step-item.active { color: var(--pe-blue-deep); }
.header-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 12px;
}
.save-state {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--grey-600);
  font-size: var(--fs-body-sm);
  white-space: nowrap;
}
.save-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--pe-green);
  box-shadow: 0 0 0 4px rgba(76,175,80,0.12);
}
.lang-toggle {
  display: inline-flex;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-pill);
  background: var(--white);
  padding: 2px;
}
.lang-toggle button {
  min-height: 32px;
  border: 0;
  background: transparent;
  color: var(--grey-600);
  padding: 0 10px;
  border-radius: var(--radius-pill);
  font-size: var(--fs-caption);
  font-weight: var(--fw-bold);
  cursor: pointer;
}
.lang-toggle button.active {
  background: var(--pe-blue);
  color: var(--white);
}

.shell {
  min-height: calc(100vh - var(--header-h));
  padding: 40px 20px 110px;
  display: grid;
  place-items: start center;
}
.card {
  width: min(100%, var(--card-max));
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  padding: 30px;
  animation: mount var(--dur) var(--ease-standard);
}
.card.wide { --card-max: 960px; }
.card.narrow { --card-max: 480px; }
.screen-kicker {
  font-size: var(--fs-micro);
  font-weight: var(--fw-semibold);
  color: var(--grey-500);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.screen-head {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: flex-start;
  margin-bottom: 24px;
}
.screen-head h1 {
  margin: 0 0 8px;
  color: var(--fg-heading);
  font-size: var(--fs-h4);
  line-height: var(--lh-snug);
  font-weight: var(--fw-regular);
}
.screen-head p {
  margin: 0;
  color: var(--grey-600);
  font-size: var(--fs-body-sm);
}
.section-title {
  margin: 0 0 14px;
  color: var(--fg-heading);
  font-size: var(--fs-h5);
  line-height: var(--lh-snug);
  font-weight: var(--fw-semibold);
  letter-spacing: -0.02em;
}
.card-section {
  padding-top: 24px;
  margin-top: 24px;
  border-top: 1px solid var(--border-subtle);
}
.field-row,
.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}
.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
}
.field {
  margin-bottom: 16px;
}
.field label {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--grey-700);
  font-size: var(--fs-body-sm);
  font-weight: var(--fw-semibold);
  margin-bottom: 6px;
}
.required {
  color: var(--color-danger);
  font-weight: var(--fw-bold);
}
.field input,
.field select,
.field textarea {
  width: 100%;
  min-height: 44px;
  border: 1px solid var(--border-input);
  border-radius: var(--radius);
  background: var(--white);
  color: var(--ink);
  padding: 10px 12px;
  outline: none;
  transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
}
.field textarea { min-height: 94px; resize: vertical; }
.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: var(--border-focus);
  box-shadow: var(--shadow-focus);
}
.field.error input,
.field.error select {
  border-color: var(--border-error);
}
.field.error input:focus,
.field.error select:focus {
  box-shadow: var(--shadow-focus-error);
}
.hint,
.error-text {
  margin-top: 6px;
  color: var(--grey-500);
  font-size: var(--fs-caption);
  line-height: var(--lh-normal);
}
.error-text { color: var(--color-danger-dark); }
.help-icon {
  width: 20px;
  height: 20px;
  border: 1px solid var(--pe-blue-soft);
  border-radius: 50%;
  background: var(--pe-blue-tint);
  color: var(--pe-blue-deep);
  display: inline-grid;
  place-items: center;
  font-size: var(--fs-caption);
  font-weight: var(--fw-bold);
  cursor: help;
  position: relative;
}
.help-icon::after {
  content: attr(data-tip);
  position: absolute;
  left: 50%;
  bottom: calc(100% + 8px);
  transform: translateX(-50%);
  width: max-content;
  max-width: 260px;
  padding: 8px 10px;
  border-radius: var(--radius);
  background: var(--grey-900);
  color: var(--white);
  font-size: var(--fs-caption);
  font-weight: var(--fw-regular);
  line-height: var(--lh-normal);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--dur-fast);
  box-shadow: var(--shadow-floating);
  z-index: 4;
}
.help-icon:hover::after,
.help-icon:focus::after { opacity: 1; }

.radio-grid,
.path-grid,
.chip-stack {
  display: grid;
  gap: 12px;
}
.radio-grid.cols-2,
.path-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.radio-grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.radio-card,
.path-card,
.chip-card,
.drop-zone,
.stat-card,
.next-card {
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  background: var(--white);
  padding: 16px;
  transition: border-color var(--dur-fast), background var(--dur-fast), box-shadow var(--dur-fast);
}
.radio-card,
.path-card,
.chip-card { cursor: pointer; }
.radio-card:hover,
.path-card:hover,
.chip-card:hover {
  border-color: var(--pe-blue-dark);
  box-shadow: var(--shadow-card-hover);
}
.radio-card.selected {
  border-color: var(--pe-blue);
  background: var(--pe-blue-tint);
}
.radio-card .radio-top,
.chip-card .chip-top,
.path-card .path-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.radio-dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 2px solid var(--grey-400);
  background: var(--white);
  flex: 0 0 auto;
}
.radio-card.selected .radio-dot {
  border-color: var(--pe-blue);
  box-shadow: inset 0 0 0 4px var(--white);
  background: var(--pe-blue);
}
.radio-card h3,
.path-card h3,
.chip-card h3,
.stat-card h3,
.next-card h3 {
  margin: 0 0 6px;
  color: var(--ink);
  font-size: var(--fs-body);
  line-height: var(--lh-snug);
  font-weight: var(--fw-semibold);
}
.radio-card p,
.path-card p,
.chip-card p,
.next-card p {
  margin: 0;
  color: var(--grey-600);
  font-size: var(--fs-body-sm);
}
.chip-card.edited {
  border-color: var(--pe-blue);
  background: var(--pe-blue-tint);
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 24px;
  padding: 3px 9px;
  border-radius: var(--radius-pill);
  font-size: var(--fs-caption);
  line-height: 1;
  font-weight: var(--fw-bold);
  white-space: nowrap;
}
.pill.gray { background: var(--grey-150); color: var(--grey-700); }
.pill.blue { background: var(--pe-blue-tint); color: var(--pe-blue-deep); }
.pill.green { background: var(--pe-green-tint); color: var(--pe-green-dark); }
.pill.amber { background: var(--color-warning-tint); color: #6A5000; }
.pill.red { background: var(--color-danger-tint); color: var(--color-danger-dark); }

.banner,
.state-banner {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 12px;
  align-items: start;
  border-radius: var(--radius);
  padding: 12px 16px;
  margin: 0 0 20px;
}
.banner .banner-icon,
.state-banner .banner-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-weight: var(--fw-bold);
}
.banner h3,
.state-banner h3 {
  margin: 0 0 2px;
  color: var(--ink);
  font-size: var(--fs-body-sm);
  line-height: var(--lh-snug);
  font-weight: var(--fw-bold);
}
.banner p,
.state-banner p {
  margin: 0;
  color: var(--ink);
  font-size: var(--fs-body-sm);
}
.banner.info {
  background: var(--pe-blue-tint);
  border-left: 3px solid var(--pe-blue);
}
.banner.info .banner-icon { background: var(--white); color: var(--pe-blue); }
.banner.success {
  background: var(--pe-green-tint);
  border-left: 3px solid var(--pe-green);
}
.banner.success .banner-icon { background: var(--white); color: var(--pe-green-dark); }
.banner.warning {
  background: var(--color-warning-tint);
  border-left: 3px solid var(--color-warning);
}
.banner.warning .banner-icon { background: var(--white); color: #6A5000; }
.banner.error {
  background: var(--color-danger-tint);
  border-left: 3px solid var(--color-danger);
}
.banner.error h3,
.banner.error p { color: var(--color-danger-dark); }
.banner.error .banner-icon { background: var(--white); color: var(--color-danger-dark); }
.state-banner {
  background: linear-gradient(90deg, var(--pe-blue-tint), var(--pe-green-tint));
  border-left: 3px solid var(--pe-green);
}
.state-banner h3 { color: var(--pe-blue-deep); }
.state-banner .banner-icon { background: var(--white); color: var(--pe-green-dark); }

.checkbox-row {
  display: grid;
  grid-template-columns: 22px 1fr;
  gap: 10px;
  align-items: start;
  margin: 12px 0;
  color: var(--grey-700);
  font-size: var(--fs-body-sm);
}
.checkbox-row input {
  width: 20px;
  height: 20px;
  margin: 2px 0 0;
  accent-color: var(--pe-blue);
}
.btn-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 26px;
}
.btn-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.btn {
  border: 1px solid transparent;
  border-radius: var(--radius);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 18px;
  min-height: 44px;
  color: var(--ink);
  background: var(--white);
  font-weight: var(--fw-semibold);
  cursor: pointer;
  text-decoration: none;
  transition: background var(--dur-fast), border-color var(--dur-fast), box-shadow var(--dur-fast);
}
.btn:focus-visible,
.radio-card:focus-visible,
.chip-card:focus-visible,
.path-card:focus-visible {
  outline: none;
  box-shadow: var(--shadow-focus);
}
.btn.primary {
  background: var(--pe-blue);
  color: var(--white);
}
.btn.primary:hover { background: var(--pe-blue-dark); }
.btn.secondary {
  border-color: var(--border-subtle);
  color: var(--grey-700);
}
.btn.ghost {
  background: transparent;
  color: var(--grey-700);
}
.btn.success {
  background: var(--pe-green);
  color: var(--white);
}
.btn.success:hover { background: var(--pe-green-dark); }
.btn.danger {
  background: var(--color-danger);
  color: var(--white);
}
.btn.large {
  min-height: 52px;
  padding: 14px 24px;
  font-size: var(--fs-h5);
}
.btn.block { width: 100%; }
.btn[disabled] {
  opacity: 0.5;
  cursor: not-allowed;
}

.otc-row {
  display: grid;
  grid-template-columns: repeat(6, 44px);
  gap: 8px;
  justify-content: center;
  margin: 22px 0;
}
.otc-row input {
  width: 44px;
  height: 56px;
  border: 1px solid var(--border-input);
  border-radius: var(--radius);
  text-align: center;
  font-size: var(--fs-h5);
  font-weight: var(--fw-bold);
  color: var(--ink);
}
.otc-row input:focus {
  outline: none;
  border-color: var(--pe-blue);
  box-shadow: var(--shadow-focus);
}
.qr-layout {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 24px;
  align-items: center;
}
.qr-box {
  width: 180px;
  height: 180px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  background:
    linear-gradient(90deg, var(--grey-900) 8px, transparent 8px) 0 0 / 24px 24px,
    linear-gradient(var(--grey-900) 8px, transparent 8px) 0 0 / 24px 24px,
    var(--white);
  display: grid;
  place-items: center;
  color: var(--white);
  position: relative;
  overflow: hidden;
}
.qr-box::after {
  content: "QR";
  position: absolute;
  width: 72px;
  height: 72px;
  border-radius: var(--radius);
  background: var(--white);
  color: var(--pe-blue-deep);
  display: grid;
  place-items: center;
  font-weight: var(--fw-bold);
}
.stepper {
  display: grid;
  gap: 14px;
  margin: 18px 0;
}
.stepper-row {
  display: grid;
  grid-template-columns: 34px 1fr;
  gap: 12px;
  align-items: start;
}
.stepper-node {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid var(--grey-300);
  display: grid;
  place-items: center;
  color: var(--grey-500);
  background: var(--white);
}
.stepper-row.done .stepper-node {
  border-color: var(--pe-green);
  background: var(--pe-green);
  color: var(--white);
}
.stepper-row.active .stepper-node {
  border-color: var(--pe-blue);
  color: var(--pe-blue);
}
.spinner {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid currentColor;
  border-right-color: transparent;
  animation: spin 800ms linear infinite;
}
.stepper-row h3 {
  margin: 2px 0 2px;
  color: var(--ink);
  font-size: var(--fs-body-sm);
}
.stepper-row p {
  margin: 0;
  color: var(--grey-600);
  font-size: var(--fs-caption);
}
.table-wrap {
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  overflow: auto;
  background: var(--white);
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 680px;
}
th, td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-subtle);
  text-align: left;
  vertical-align: middle;
  font-size: var(--fs-body-sm);
}
th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: var(--grey-50);
  color: var(--grey-600);
  font-size: var(--fs-caption);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
tr:last-child td { border-bottom: 0; }
tr.row-err td { background: rgba(248,51,60,0.08); }
.totals-row td {
  background: var(--pe-blue-tint);
  font-weight: var(--fw-bold);
}
.drop-zone {
  min-height: 150px;
  display: grid;
  place-items: center;
  text-align: center;
  border-style: dashed;
  background: var(--grey-50);
}
.drop-zone:hover {
  border-color: var(--pe-blue);
  background: var(--pe-blue-tint);
}
.signature-box {
  height: 116px;
  border: 1px solid var(--border-input);
  border-radius: var(--radius);
  background: linear-gradient(var(--white), var(--white)) padding-box,
    repeating-linear-gradient(0deg, transparent, transparent 35px, var(--grey-200) 36px);
  display: grid;
  place-items: center;
  color: var(--grey-500);
  font-family: "Brush Script MT", "Segoe Script", cursive;
  font-size: 34px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}
.stat-card {
  background: var(--grey-50);
}
.stat-card .stat-label {
  color: var(--grey-500);
  font-size: var(--fs-caption);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: var(--fw-bold);
}
.stat-card .stat-value {
  margin-top: 5px;
  color: var(--grey-900);
  font-size: var(--fs-h4);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
}
.next-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}
.success-mark {
  width: 68px;
  height: 68px;
  margin: 0 auto 18px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: var(--pe-green-tint);
  color: var(--pe-green-dark);
  font-size: 34px;
  animation: pop var(--dur-slow) var(--ease-standard);
}
.celebration {
  text-align: center;
  max-width: 620px;
  margin: 0 auto;
}
.timeline {
  display: grid;
  gap: 10px;
}
.timeline-item {
  display: grid;
  grid-template-columns: 112px 1fr;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-subtle);
}
.timeline-time {
  color: var(--grey-500);
  font-size: var(--fs-caption);
  font-weight: var(--fw-bold);
}

.help-fab {
  position: fixed;
  left: 22px;
  bottom: 22px;
  z-index: 45;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 0;
  background: var(--pe-blue);
  color: var(--white);
  box-shadow: var(--shadow-floating);
  cursor: pointer;
}
.help-fab svg { display: block; margin: auto; }
.prototype-toolbar {
  position: fixed;
  z-index: 50;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%);
  width: min(calc(100% - 112px), 930px);
  display: grid;
  grid-template-columns: 44px minmax(180px, 1.3fr) minmax(160px, 1fr) 44px;
  gap: 8px;
  align-items: center;
  padding: 8px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  background: rgba(255,255,255,0.96);
  box-shadow: var(--shadow-floating);
  backdrop-filter: blur(12px);
}
.prototype-toolbar select,
.prototype-toolbar button {
  min-height: 40px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  background: var(--white);
  color: var(--ink);
  padding: 0 10px;
}
.prototype-toolbar button {
  cursor: pointer;
  font-weight: var(--fw-bold);
}
.prototype-toolbar .counter {
  color: var(--grey-500);
  font-size: var(--fs-caption);
  text-align: center;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(38,50,56,0.46);
}
.modal-backdrop.open { display: flex; }
.modal {
  width: min(100%, 520px);
  max-height: calc(100vh - 32px);
  overflow: auto;
  border-radius: var(--radius-lg);
  background: var(--white);
  box-shadow: var(--shadow-floating);
  animation: modalIn var(--dur) var(--ease-standard);
}
.modal-head {
  position: sticky;
  top: 0;
  z-index: 2;
  display: flex;
  justify-content: space-between;
  gap: 14px;
  padding: 20px 20px 14px;
  background: var(--white);
  border-bottom: 1px solid var(--border-subtle);
}
.modal-head h2 {
  margin: 0;
  color: var(--fg-heading);
  font-size: var(--fs-h5);
}
.modal-head p {
  margin: 4px 0 0;
  color: var(--grey-600);
  font-size: var(--fs-body-sm);
}
.modal-close {
  width: 36px;
  height: 36px;
  min-height: 36px;
  border: 0;
  border-radius: var(--radius);
  background: var(--grey-100);
  color: var(--grey-700);
  cursor: pointer;
}
.modal-body { padding: 20px; }
.modal-actions {
  position: sticky;
  bottom: 0;
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 14px 20px 20px;
  background: var(--white);
  border-top: 1px solid var(--border-subtle);
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes mount {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes pop {
  0% { transform: scale(0.86); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

@media (max-width: 900px) {
  .app-header {
    grid-template-columns: 1fr auto;
    gap: 12px;
  }
  .step-progress { display: none; }
  .shell { padding-top: 24px; }
  .card { padding: 20px; }
  .screen-head { display: block; }
  .field-row,
  .grid-2,
  .grid-3,
  .radio-grid.cols-2,
  .radio-grid.cols-3,
  .path-grid,
  .stats,
  .next-grid,
  .qr-layout {
    grid-template-columns: 1fr;
  }
  .prototype-toolbar {
    width: calc(100% - 24px);
    left: 12px;
    transform: none;
    grid-template-columns: 40px minmax(0, 1fr) 40px;
  }
  .prototype-toolbar #variantSelect { grid-column: 1 / -1; }
  .prototype-toolbar .counter { display: none; }
  .brand-name { display: none; }
  .save-state { display: none; }
}
@media (max-width: 480px) {
  .app-header { padding: 0 14px; }
  .plan-badge { display: none; }
  .shell { padding-left: 12px; padding-right: 12px; }
  .card { padding: 20px; border-radius: var(--radius-md); }
  .btn-row { flex-direction: column-reverse; }
  .btn-row .btn-group,
  .btn-row .btn { width: 100%; }
  .otc-row { grid-template-columns: repeat(6, minmax(0, 1fr)); }
  .otc-row input { width: 100%; }
  .timeline-item { grid-template-columns: 1fr; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 1ms !important;
    transition-duration: 1ms !important;
    scroll-behavior: auto !important;
  }
}
</style>
</head>
<body>
<header class="app-header" aria-label="PayEvo onboarding header">
  <div class="brand">
    <div class="brand-mark" aria-hidden="true">P</div>
    <div class="brand-name">PayEvo</div>
    <span class="plan-badge">Growth</span>
  </div>
  <nav class="step-progress" id="stepProgress" aria-label="Onboarding progress"></nav>
  <div class="header-actions">
    <div class="save-state" role="status" aria-live="polite"><span class="save-dot"></span><span id="saveText">Saved</span></div>
    <div class="lang-toggle" aria-label="Language">
      <button type="button" class="active" data-lang="en">EN</button>
      <button type="button" data-lang="fr">FR</button>
    </div>
  </div>
</header>

<main class="shell">
  <article class="card" id="screenFrame" tabindex="-1"></article>
</main>

<button class="help-fab" type="button" aria-label="Open chat help" data-modal="help">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path d="M5 17.5V7a3 3 0 013-3h8a3 3 0 013 3v5.5a3 3 0 01-3 3H9l-4 4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
  </svg>
</button>

<div class="prototype-toolbar" aria-label="Prototype screen controls">
  <button type="button" id="prevScreen" aria-label="Previous screen">&lsaquo;</button>
  <select id="screenSelect" aria-label="Choose screen"></select>
  <select id="variantSelect" aria-label="Choose screen variant"></select>
  <button type="button" id="nextScreen" aria-label="Next screen">&rsaquo;</button>
  <div class="counter" id="screenCounter"></div>
</div>

<div class="modal-backdrop" id="modalRoot" aria-hidden="true"></div>

<script>
const appState = {
  screenIndex: 0,
  variantIndex: 0,
  lang: 'en',
  savedTimer: null
};

const steps = [
  { label: 'Business', fr: 'Entreprise' },
  { label: 'ID & Bank', fr: 'ID et banque' },
  { label: 'Payroll', fr: 'Paie' },
  { label: 'Employees', fr: 'Employes' },
  { label: 'Run', fr: 'Lancer' }
];

function t(en, fr) {
  return appState.lang === 'fr' ? (fr || en) : en;
}

function slug(value) {
  return value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function head(kicker, title, subtitle, aside = '') {
  return `
    <div class="screen-kicker">${kicker}</div>
    <div class="screen-head">
      <div>
        <h1>${title}</h1>
        <p>${subtitle}</p>
      </div>
      ${aside}
    </div>`;
}

function field(label, value = '', hint = '', options = {}) {
  const id = options.id || slug(label + Math.random().toString(16).slice(2, 6));
  const type = options.type || 'text';
  const required = options.required ? '<span class="required" aria-hidden="true">*</span>' : '';
  const help = options.tip ? `<span tabindex="0" class="help-icon" data-tip="${options.tip}" aria-label="${options.tip}">?</span>` : '';
  const disabled = options.disabled ? 'disabled' : '';
  const described = hint || options.error ? `aria-describedby="${id}-hint"` : '';
  const errorClass = options.error ? ' error' : '';
  let control = '';
  if (options.select) {
    control = `<select id="${id}" ${disabled} ${described}>${options.select.map(item => `<option${item === value ? ' selected' : ''}>${item}</option>`).join('')}</select>`;
  } else if (options.textarea) {
    control = `<textarea id="${id}" ${described} placeholder="${options.placeholder || ''}">${value}</textarea>`;
  } else {
    control = `<input id="${id}" type="${type}" value="${value}" placeholder="${options.placeholder || ''}" ${disabled} ${described} ${options.pattern ? `pattern="${options.pattern}"` : ''}>`;
  }
  return `<div class="field${errorClass}"><label for="${id}">${label}${required}${help}</label>${control}${hint ? `<div class="hint" id="${id}-hint">${hint}</div>` : ''}${options.error ? `<div class="error-text" id="${id}-hint">${options.error}</div>` : ''}</div>`;
}

function banner(type, title, body) {
  const icon = { info: 'i', success: '&check;', warning: '!', error: '!' }[type] || 'i';
  return `<div class="banner ${type}" role="${type === 'error' ? 'alert' : 'status'}"><div class="banner-icon">${icon}</div><div><h3>${title}</h3><p>${body}</p></div></div>`;
}

function stateBanner(body = t('ePay direct deposit is being verified and will activate automatically - most approvals complete within 4 business hours.', 'Le depot direct ePay est en verification et s activera automatiquement - la plupart des approbations sont terminees en 4 heures ouvrables.'), title = t('Your account is live for payroll.', 'Votre compte est pret pour la paie.')) {
  return `<div class="state-banner" role="status" aria-live="polite"><div class="banner-icon">&check;</div><div><h3>${title}</h3><p>${body}</p></div></div>`;
}

function pill(color, text) {
  return `<span class="pill ${color}">${text}</span>`;
}

function radio(title, body, selected = false, tag = '') {
  return `<div class="radio-card${selected ? ' selected' : ''}" role="radio" tabindex="0" aria-checked="${selected}">
    <div class="radio-top"><div><h3>${title}</h3><p>${body}</p></div><span class="radio-dot" aria-hidden="true"></span></div>
    ${tag ? `<div style="margin-top:12px">${tag}</div>` : ''}
  </div>`;
}

function chip(title, summary, status = 'Default', edited = false, modal = '') {
  return `<div class="chip-card${edited ? ' edited' : ''}" tabindex="0">
    <div class="chip-top">
      <div><h3>${title}</h3><p>${summary}</p></div>
      <div class="btn-group">${pill(edited ? 'blue' : 'gray', status)}${modal ? `<button class="btn ghost" type="button" data-modal="${modal}">${t('Edit', 'Modifier')}</button>` : ''}</div>
    </div>
  </div>`;
}

function buttons(nextText = t('Continue', 'Continuer'), options = {}) {
  const prev = options.noBack ? '' : `<button type="button" class="btn secondary" data-prev>${t('Back', 'Retour')}</button>`;
  const nextClass = options.success ? 'success' : (options.danger ? 'danger' : 'primary');
  const disabled = options.disabled ? 'disabled' : '';
  const extra = options.extra || '';
  return `<div class="btn-row">${prev}<div class="btn-group">${extra}<button type="button" class="btn ${nextClass} ${options.large ? 'large' : ''}" data-next ${disabled}>${nextText}</button></div></div>`;
}

function table(headers, rows, options = {}) {
  return `<div class="table-wrap"><table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(row => `<tr class="${row.class || ''}">${row.cells.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>${options.footer || ''}</table></div>`;
}

function stepper(items) {
  return `<div class="stepper">${items.map(item => `<div class="stepper-row ${item.state}">
    <div class="stepper-node">${item.state === 'active' ? '<span class="spinner"></span>' : item.state === 'done' ? '&check;' : '&cir;'}</div>
    <div><h3>${item.title}</h3><p>${item.body}</p></div>
  </div>`).join('')}</div>`;
}

function statCards(items) {
  return `<div class="stats">${items.map(item => `<div class="stat-card"><div class="stat-label">${item.label}</div><div class="stat-value">${item.value}</div></div>`).join('')}</div>`;
}

function nextCards() {
  const cards = [
    [t('Add more employees', 'Ajouter des employes'), t('Invite via CSV or PayChequer.', 'Inviter par CSV ou PayChequer.')],
    [t('Connect accounting', 'Connecter la comptabilite'), t('Sync payroll journal entries.', 'Synchroniser les ecritures de paie.')],
    [t('Schedule next payroll', 'Planifier la prochaine paie'), t('Set the next pay date now.', 'Choisir la prochaine date de paie.')],
    [t('Invite accountant', 'Inviter le comptable'), t('Share controlled access.', 'Partager un acces controle.')]
  ];
  return `<div class="next-grid">${cards.map(([title, body]) => `<div class="next-card"><h3>${title}</h3><p>${body}</p></div>`).join('')}</div>`;
}

const screens = [
  {
    id: 'role-gate',
    label: 'Role gate',
    step: 0,
    size: 'narrow',
    variants: ['Owner or signer', 'Employee terminal'],
    render(v) {
      const employee = v === 1;
      return head(t('Sign up', 'Inscription'), t('Welcome to PayEvo', 'Bienvenue a PayEvo'), t('Which best describes you?', 'Lequel vous decrit le mieux?')) +
        (employee ? banner('info', t("You do not sign up here.", "Cette inscription n est pas pour vous."), t('Employees and contractors use PayChequer to see pay stubs and add banking details.', 'Les employes et contractuels utilisent PayChequer pour consulter les talons et ajouter leurs coordonnees bancaires.')) : '') +
        `<div class="radio-grid">${[
          radio(t('Owner / Signing Officer', 'Proprietaire / signataire autorise'), t('I can legally bind the business.', 'Je peux engager legalement l entreprise.'), !employee),
          radio(t('Payroll Admin', 'Administrateur de la paie'), t('I run payroll, but may not be the signer.', 'Je gere la paie, sans etre necessairement signataire.')),
          radio(t('Accountant or Bookkeeper', 'Comptable ou teneur de livres'), t('I am setting this up for a client.', 'Je configure la paie pour un client.')),
          radio(t('Employee or Contractor', 'Employe ou contractuel'), t('I need PayChequer, not employer onboarding.', 'J ai besoin de PayChequer, pas de l inscription employeur.'), employee)
        ].join('')}</div>` +
        buttons(employee ? t('Open PayChequer', 'Ouvrir PayChequer') : t('Continue', 'Continuer'), { noBack: true, disabled: false });
    }
  },
  {
    id: 'signup',
    label: 'Sign up',
    step: 0,
    size: 'narrow',
    variants: ['Email and password', 'SSO returned'],
    render(v) {
      const sso = v === 1;
      const ssoButtons = `<div class="grid-2" style="margin-bottom:16px"><button class="btn secondary" type="button">Google</button><button class="btn secondary" type="button">Microsoft</button></div>`;
      return head(t('Sign up', 'Inscription'), t('Create your account', 'Creez votre compte'), t('Takes about 30 seconds.', 'Environ 30 secondes.')) +
        ssoButtons +
        (sso ? banner('success', t('Google account connected.', 'Compte Google connecte.'), t('Confirm the two required consents to continue.', 'Confirmez les deux consentements requis pour continuer.')) :
        `<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin:8px 0 18px"><div style="height:1px;background:var(--border-subtle)"></div><span class="hint">or</span><div style="height:1px;background:var(--border-subtle)"></div></div>
        ${field(t('Email', 'Courriel'), 'roberto@biopick.ca', '', { required: true, type: 'email' })}
        ${field(t('Full name', 'Nom complet'), 'Roberto Alvarez', '', { required: true })}
        ${field(t('Password', 'Mot de passe'), '', t('At least 12 characters.', 'Au moins 12 caracteres.'), { required: true, type: 'password' })}`) +
        `<label class="checkbox-row"><input type="checkbox" checked><span>${t('I agree to the Terms of Service, Privacy Policy, and Confidentiality terms.', 'J accepte les conditions de service, la politique de confidentialite et les conditions de confidentialite.')}</span></label>
        <label class="checkbox-row"><input type="checkbox" ${sso ? 'checked' : ''}><span>${t('I have authority to bind this business or will invite the signer.', 'Je suis autorise a engager cette entreprise ou j inviterai le signataire.')}</span></label>` +
        buttons(t('Create account', 'Creer le compte'), { noBack: false, large: true });
    }
  },
  {
    id: 'otc',
    label: 'Email code',
    step: 0,
    size: 'narrow',
    variants: ['Default', 'Wrong code', 'Lockout'],
    render(v) {
      const err = v === 1 ? banner('error', t('That code did not match.', 'Ce code ne correspond pas.'), t('Check the latest email from PayEvo or resend a new code.', 'Verifiez le dernier courriel de PayEvo ou renvoyez un nouveau code.')) : '';
      const lock = v === 2 ? banner('warning', t('Too many attempts.', 'Trop de tentatives.'), t('Try again in 14:32 or chat with us for help.', 'Reessayez dans 14:32 ou clavardez avec nous.')) : '';
      return head(t('Sign up', 'Inscription'), t('Check your email', 'Verifiez votre courriel'), t('We sent a 6-digit code to roberto@biopick.ca. It expires in 15 minutes.', 'Nous avons envoye un code a 6 chiffres a roberto@biopick.ca. Il expire dans 15 minutes.')) +
        err + lock +
        `<div class="otc-row" data-otc>${[0,1,2,3,4,5].map(i => `<input inputmode="numeric" maxlength="1" aria-label="Code digit ${i + 1}" ${v === 1 ? `value="${[4,1,9,0,2,8][i]}"` : ''}>`).join('')}</div>
        <button class="btn primary block" type="button" data-next ${v === 2 ? 'disabled' : ''}>${t('Verify', 'Verifier')}</button>
        <div style="text-align:center;margin-top:16px"><a href="#">${t('Resend code', 'Renvoyer le code')}</a></div>`;
    }
  },
  {
    id: 'business-basics',
    label: 'Business basics',
    step: 1,
    variants: ['Sole proprietor', 'Federal corp match', 'Resume + registry degraded'],
    render(v) {
      const match = v === 1 ? banner('success', t('Registry match found.', 'Correspondance au registre trouvee.'), t('We matched BioPick Enterprises Inc. and pre-filled the registered address.', 'Nous avons trouve BioPick Enterprises Inc. et pre-rempli l adresse enregistree.')) : '';
      const degraded = v === 2 ? banner('info', t('Welcome back - pick up where you left off.', 'Bon retour - reprenez la ou vous etiez.'), t('We saved your progress on Apr 4, 2026. We will confirm registration in the background because the registry is slow right now.', 'Nous avons sauvegarde votre progression le 4 avril 2026. Nous confirmerons l inscription en arriere-plan, car le registre est lent en ce moment.')) : '';
      return head(t('Step 1 of 5 - Business', 'Etape 1 de 5 - Entreprise'), t('Tell us about your business', 'Parlez-nous de votre entreprise'), t("We will use this to pre-fill what we can and skip the rest.", 'Nous utiliserons ces donnees pour pre-remplir ce qui est possible.')) +
        match + degraded +
        field(t('Legal Business Name', 'Nom legal de l entreprise'), v === 0 ? 'BioPick Consulting' : 'BioPick Enterprises Inc.', '', { required: true }) +
        field(t('Operating Name / DBA', 'Nom commercial'), 'BioPick', '', {}) +

      ['Federal tax YTD','$2,100.00'],
      ['Provincial tax YTD','$1,140.00'],
      ['CPP / CPP2 YTD','$888.40'],
      ['EI YTD','$302.20'],
      ['Vacation accrual carry-in','$736.00']
    ].map(([label, value]) => field(label, value)).join('')}</div>${banner('info', t('Validation owner: tax engine.', 'Responsable validation: moteur fiscal.'), t('The design provides the input contract; payroll calculation validates totals.', 'Le design fournit le contrat de saisie; le moteur de paie valide les totaux.'))}`
  }
};

function currentScreen() {
  return screens[appState.screenIndex];
}

function renderStepProgress() {
  const activeStep = currentScreen().step;
  document.getElementById('stepProgress').innerHTML = steps.map((step, index) => {
    const number = index + 1;
    const state = activeStep > number ? 'done' : activeStep === number ? 'active' : '';
    return `<div class="step-item ${state}"><div class="step-dot">${state === 'done' ? '&check;' : number}</div><div>${t(step.label, step.fr)}</div></div>`;
  }).join('');
}

function renderToolbar() {
  const screenSelect = document.getElementById('screenSelect');
  screenSelect.innerHTML = screens.map((screen, index) => `<option value="${index}" ${index === appState.screenIndex ? 'selected' : ''}>${String(index).padStart(2, '0')} - ${screen.label}</option>`).join('');
  const variants = currentScreen().variants || ['Default'];
  const variantSelect = document.getElementById('variantSelect');
  variantSelect.innerHTML = variants.map((name, index) => `<option value="${index}" ${index === appState.variantIndex ? 'selected' : ''}>${name}</option>`).join('');
  document.getElementById('screenCounter').textContent = `${appState.screenIndex + 1} of ${screens.length}`;
  document.getElementById('prevScreen').disabled = appState.screenIndex === 0;
  document.getElementById('nextScreen').disabled = appState.screenIndex === screens.length - 1;
}

function render() {
  const screen = currentScreen();
  const frame = document.getElementById('screenFrame');
  frame.className = `card ${screen.size || ''}`;
  const variants = screen.variants || ['Default'];
  if (appState.variantIndex >= variants.length) appState.variantIndex = 0;
  frame.innerHTML = screen.render(appState.variantIndex);
  frame.focus({ preventScroll: true });
  renderStepProgress();
  renderToolbar();
  bindSignature();
}

function go(delta) {
  const next = Math.min(Math.max(appState.screenIndex + delta, 0), screens.length - 1);
  appState.screenIndex = next;
  appState.variantIndex = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function markSaving() {
  const saveText = document.getElementById('saveText');
  saveText.textContent = t('Saving...', 'Enregistrement...');
  clearTimeout(appState.savedTimer);
  appState.savedTimer = setTimeout(() => {
    saveText.textContent = t('Saved', 'Enregistre');
  }, 800);
}

function openModal(key) {
  const modal = modals[key];
  if (!modal) return;
  const root = document.getElementById('modalRoot');
  root.classList.add('open');
  root.setAttribute('aria-hidden', 'false');
  root.innerHTML = `<div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-head"><div><h2 id="modalTitle">${modal.title}</h2><p>${modal.subtitle || ''}</p></div><button type="button" class="modal-close" data-close-modal aria-label="${t('Close modal', 'Fermer la fenetre')}">&times;</button></div>
    <div class="modal-body">${modal.body()}</div>
    <div class="modal-actions"><button type="button" class="btn ghost" data-close-modal>${t('Cancel', 'Annuler')}</button><button type="button" class="btn primary" data-save-modal>${key === 'ytd' ? t('Save YTD totals', 'Enregistrer les totaux') : t('Save changes', 'Enregistrer')}</button></div>
  </div>`;
  root.querySelector('.modal-close').focus();
}

function closeModal() {
  const root = document.getElementById('modalRoot');
  root.classList.remove('open');
  root.setAttribute('aria-hidden', 'true');
  root.innerHTML = '';
}

function bindSignature() {
  const name = document.getElementById('signatureName');
  const preview = document.getElementById('signaturePreview');
  if (!name || !preview) return;
  name.addEventListener('input', () => {
    preview.textContent = name.value || t('Signature appears here', 'La signature apparait ici');
  });
}

document.addEventListener('click', event => {
  const radioCard = event.target.closest('.radio-card');
  if (radioCard && radioCard.parentElement) {
    radioCard.parentElement.querySelectorAll('.radio-card').forEach(card => {
      card.classList.remove('selected');
      card.setAttribute('aria-checked', 'false');
    });
    radioCard.classList.add('selected');
    radioCard.setAttribute('aria-checked', 'true');
    markSaving();
  }
  const file = event.target.closest('[data-file]');
  if (file) {
    file.innerHTML = `<div>${chip(t('Document uploaded', 'Document televerse'), 'ownership-proof.pdf - 842 KB', t('Uploaded', 'Televerse'), true)}</div>`;
    markSaving();
  }
  const modalButton = event.target.closest('[data-modal]');
  if (modalButton) openModal(modalButton.dataset.modal);
  if (event.target.closest('[data-close-modal]')) closeModal();
  if (event.target.closest('[data-save-modal]')) {
    closeModal();
    markSaving();
  }
  if (event.target.closest('[data-next]')) go(1);
  if (event.target.closest('[data-prev]')) go(-1);
});

document.addEventListener('input', event => {
  if (event.target.matches('input, select, textarea')) markSaving();
});

document.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeModal();
  if (event.target.matches('[data-otc] input')) {
    const inputs = [...event.target.closest('[data-otc]').querySelectorAll('input')];
    const index = inputs.indexOf(event.target);
    setTimeout(() => {
      if (event.target.value && inputs[index + 1]) inputs[index + 1].focus();
    }, 0);
  }
});

document.addEventListener('paste', event => {
  if (!event.target.matches('[data-otc] input')) return;
  const digits = event.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6).split('');
  const inputs = [...event.target.closest('[data-otc]').querySelectorAll('input')];
  digits.forEach((digit, index) => { if (inputs[index]) inputs[index].value = digit; });
  if (digits.length === 6) markSaving();
  event.preventDefault();
});

document.querySelector('.lang-toggle').addEventListener('click', event => {
  const button = event.target.closest('button[data-lang]');
  if (!button) return;
  appState.lang = button.dataset.lang;
  document.documentElement.lang = appState.lang === 'fr' ? 'fr-CA' : 'en';
  document.querySelectorAll('.lang-toggle button').forEach(btn => btn.classList.toggle('active', btn === button));
  render();
});

document.getElementById('screenSelect').addEventListener('change', event => {
  appState.screenIndex = Number(event.target.value);
  appState.variantIndex = 0;
  render();
});
document.getElementById('variantSelect').addEventListener('change', event => {
  appState.variantIndex = Number(event.target.value);
  render();
});
document.getElementById('prevScreen').addEventListener('click', () => go(-1));
document.getElementById('nextScreen').addEventListener('click', () => go(1));

setInterval(() => {
  document.querySelectorAll('[data-countdown]').forEach(node => {
    node.textContent = appState.lang === 'fr' ? 'dans 2 jours 4 heures' : 'in 2 days 4 hours';
  });
}, 60000);

render();
</script>
</body>
</html>
