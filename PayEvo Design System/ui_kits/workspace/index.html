<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>PayEvo Workspace — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html, body, #app { height: 100%; margin: 0; }
  body { background: #F4F8FB; font-family: 'Open Sans', sans-serif; color: #444; }
  .app-shell { display: flex; flex-direction: column; height: 100vh; min-height: 720px; }
  .app-body { display: flex; flex: 1; min-height: 0; }
  .app-main { flex: 1; min-width: 0; background: #F4F8FB; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div id="app"></div>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [authed, setAuthed] = useState(true);
  const [nav, setNav] = useState("home");

  useEffect(() => {
    const t = setInterval(() => window.lucide && window.lucide.createIcons(), 200);
    return () => clearInterval(t);
  }, [authed, nav]);

  if (!authed) return <LoginScreen onLogin={() => setAuthed(true)}/>;

  return (
    <div className="app-shell" data-screen-label={`PayEvo Workspace · ${nav}`}>
      <TopHeader/>
      <div className="app-body">
        <Sidebar active={nav} onNav={setNav}/>
        <main className="app-main">
          {nav === "home"      && <HomeScreen/>}
          {nav === "employees" && <EmployeesScreen/>}
          {nav === "reports"   && <ReportsScreen/>}
          {nav === "payroll"   && <HomeScreen/>}
          {nav === "actions"   && <ReportsScreen/>}
          {nav === "settings"  && <ReportsScreen/>}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
