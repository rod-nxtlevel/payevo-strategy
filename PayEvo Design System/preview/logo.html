<!doctype html><html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);display:flex;gap:24px;align-items:stretch;}
  .col{display:flex;flex-direction:column;gap:8px;flex:1;}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#7987A9;font-weight:600;}
  .tile{display:flex;align-items:center;justify-content:center;border-radius:8px;padding:36px 24px;min-height:120px;}
  .tile.light{background:#fff;border:1px solid #E0E0E0;}
  .tile.dark{background:#2285D0;}
  .tile img{max-width:80%;height:auto;display:block;}
</style></head><body>
  <div class="col">
    <div class="lbl">Default · Black</div>
    <div class="tile light"><img src="../assets/logos/payevo-wordmark-black.svg" alt="PayEvo"/></div>
  </div>
  <div class="col">
    <div class="lbl">Inverse · White</div>
    <div class="tile dark"><img src="../assets/logos/payevo-wordmark-white.svg" alt="PayEvo"/></div>
  </div>
</body></html>
