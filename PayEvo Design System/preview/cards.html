<!doctype html><html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#F4F8FB;font-family:'Open Sans',sans-serif;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card{background:#fff;border:1px solid #E0E0E0;border-radius:5px;padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);}
  .card h4{margin:0 0 6px;font-size:18px;font-weight:600;color:#444;}
  .card p{margin:0;font-size:13px;color:#70808F;line-height:1.5;}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .badge{font-size:11px;color:#fff;background:#4CAF50;padding:2px 8px;border-radius:999px;font-weight:600;}
  .badge.warn{background:#F5B700;}
  .num{font-size:32px;font-weight:300;color:#2285D0;letter-spacing:-.02em;}
</style></head><body>
<div class="row">
  <div class="card"><div class="top"><span style="font-size:12px;color:#7987A9;text-transform:uppercase;letter-spacing:.08em;font-weight:600;">Net Pay</span><span class="badge">Active</span></div><div class="num">$24,182.50</div><p>Pay period ending Apr 30, 2026.</p></div>
  <div class="card"><div class="top"><h4>Title here</h4><span class="badge warn">Pending</span></div><p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt.</p></div>
</div>
</body></html>
