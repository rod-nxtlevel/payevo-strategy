<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:'Open Sans',sans-serif;}
  .row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
  .field{display:flex;flex-direction:column;gap:4px;width:200px;}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#7987A9;font-weight:600;}
  .input{padding:8px 10px;border:1px solid #C4C4C4;border-radius:5px;font-size:14px;font-family:inherit;background:#fff;color:#444;}
  .input:focus{outline:none;border-color:#2285D0;box-shadow:0 0 0 3px rgba(34,133,208,.2);}
  .input.invalid{border-color:#F8333C;}
  .input.disabled{background:#F4F8FB;color:#C4C4C4;}
  .help{font-size:11px;color:#7987A9;}
  .help.err{color:#F8333C;}
</style></head><body>
<div class="row">
  <div class="field"><label>Default</label><input class="input" value="2/04/2021"/></div>
  <div class="field"><label>Focus</label><input class="input" value="2/04/2021" autofocus/></div>
  <div class="field"><label>Invalid</label><input class="input invalid" value="2/04/2"/><span class="help err">Required field</span></div>
  <div class="field"><label>Disabled</label><input class="input disabled" value="2/04/2021" disabled/></div>
</div>
</body></html>
